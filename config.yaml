# Personal AI Configuration
# ========================
# Edit this file to customize your personal AI assistant.

# Where your files live
data:
  folder: "./my_data"  # Put your documents, images, etc. here
  output: "./data"     # Where indexes and embeddings are stored

# File types to process
supported_files:
  documents:
    - ".txt"
    - ".md"
    - ".pdf"
    - ".docx"
  images:
    - ".jpg"
    - ".jpeg"
    - ".png"

# Folders/files to exclude (for privacy)
exclude:
  folders:
    - ".git"
    - "__pycache__"
    - "node_modules"
  patterns:
    - "*.tmp"
    - "*.log"
    - ".DS_Store"

# OCR settings
ocr:
  provider: "doctr"          # docTR with PyTorch backend
  min_text_threshold: 100    # chars below which OCR is attempted on PDFs

# Chunking settings
chunking:
  chunk_size: 500      # Characters per chunk
  overlap: 50          # Overlap between chunks

# Embedding model
embeddings:
  model: "all-MiniLM-L6-v2"  # Fast and good quality

# Vector database
vector_db:
  provider: "chromadb"
  path: "./data/chroma_db"
  collection: "personal_docs"

# Search settings
search:
  top_k: 5
  min_similarity: 0.1
  semantic_weight: 0.7
  keyword_weight: 0.3

# LLM settings (for generation)
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  max_tokens: 1024
  # api_key: Set via environment variable ANTHROPIC_API_KEY

# Privacy settings
privacy:
  show_sources: true
  log_queries: false

# API / server
api:
  upload_max_mb: 20

# Morning brief (8am Telegram)
morning_brief:
  weather_location: "Austin, TX"

# Recruiter agent — resume-only context (separate from main RAG)
recruiter:
  resume_files:
    - "my_data/resume.md"
    - "my_data/Madhav_Ayyagari_Resume_LPM.pdf"
